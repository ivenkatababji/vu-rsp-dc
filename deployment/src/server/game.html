<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0612" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Rock · Paper · Scissors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #0a0612;
      --bg1: #1a0f2e;
      --bg2: #0d1f2d;
      --surface: rgba(255, 255, 255, 0.06);
      --surface2: rgba(255, 255, 255, 0.1);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f4f0ff;
      --muted: #9b8fb8;
      --accent: #ff6b9d;
      --accent2: #7c5cff;
      --win: #5ee4a3;
      --lose: #ff8a7a;
      --draw: #c4b5fd;
      --tile-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      --radius: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    html, body {
      min-height: 100%;
      font-family: "Outfit", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg0);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      background:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(124, 92, 255, 0.35), transparent),
        radial-gradient(ellipse 80% 50% at 100% 50%, rgba(255, 107, 157, 0.12), transparent),
        radial-gradient(ellipse 60% 40% at 0% 80%, rgba(94, 228, 163, 0.08), transparent),
        linear-gradient(165deg, var(--bg0) 0%, var(--bg1) 45%, var(--bg2) 100%);
      min-height: 100dvh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1.25rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
    }

    .app {
      width: 100%;
      max-width: 420px;
      position: relative;
      flex-shrink: 0;
    }

    h1 {
      font-family: "Syne", sans-serif;
      font-weight: 800;
      font-size: clamp(1.75rem, 6vw, 2.25rem);
      letter-spacing: -0.03em;
      text-align: center;
      margin-bottom: 0.35rem;
      background: linear-gradient(135deg, #fff 0%, #d4c8f5 50%, #ff9ec4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 300;
      margin-bottom: 2rem;
    }

    .panel {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      box-shadow: var(--tile-shadow);
    }

    /* Login */
    #view-login .panel { animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      margin-bottom: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(124, 92, 255, 0.25);
    }

    .btn-primary {
      width: 100%;
      padding: 1rem 1.25rem;
      min-height: 48px;
      border: none;
      border-radius: 14px;
      font-family: "Syne", sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      box-shadow: 0 4px 24px rgba(124, 92, 255, 0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(255, 107, 157, 0.35);
    }

    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .error-msg {
      color: var(--lose);
      font-size: 0.875rem;
      margin-top: 1rem;
      text-align: center;
      display: none;
    }

    .error-msg.visible { display: block; }

    /* Game view */
    #view-game { display: none; }
    #view-game.active { display: block; animation: rise 0.5s ease forwards; }

    #view-game .panel {
      --game-stack-gap: 0.3rem;
    }

    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      gap: 0.5rem;
      margin-bottom: var(--game-stack-gap);
      padding: 0.75rem 0.65rem;
      background: var(--surface2);
      border-radius: 14px;
      border: 1px solid var(--border);
    }

    .score-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
      flex: 0 0 auto;
      min-width: 4rem;
    }

    .score-block .score-label {
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .score-block .score-value {
      font-family: "Syne", sans-serif;
      font-weight: 800;
      font-size: 1.65rem;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      min-width: 1ch;
      text-align: center;
    }

    .score-block.score-you .score-value { color: var(--win); }
    .score-block.score-house .score-value { color: var(--lose); }

    .round-pill {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      min-width: 0;
    }

    .score-match-hint {
      font-size: 0.68rem;
      line-height: 1.35;
      color: var(--muted);
      text-align: center;
      margin: 0 0 var(--game-stack-gap);
      opacity: 0.92;
    }

    .user-stats {
      font-size: 0.78rem;
      line-height: 1.45;
      color: var(--muted);
      text-align: center;
      margin: 0 0 var(--game-stack-gap);
      padding: 0.5rem 0.35rem;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.06);
      min-height: 2.5rem;
      display: none;
    }

    .user-stats.visible { display: block; }

    .user-stats .hl-w { color: var(--win); font-weight: 600; }
    .user-stats .hl-l { color: var(--lose); font-weight: 600; }
    .user-stats .hl-d { color: var(--draw); font-weight: 600; }

    .game-input-section {
      margin-bottom: var(--game-stack-gap);
    }

    .input-mode-switcher {
      position: relative;
      z-index: 5;
      display: flex;
      gap: 0.3rem;
      margin-bottom: 0.7rem;
      padding: 0.25rem;
      background: rgba(0, 0, 0, 0.22);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .input-mode-switcher[hidden] {
      display: none !important;
    }

    .input-mode-tab {
      flex: 1;
      min-width: 0;
      min-height: 40px;
      padding: 0.4rem 0.35rem;
      border: none;
      border-radius: 9px;
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      transition: color 0.15s, background 0.15s, box-shadow 0.15s;
    }

    .input-mode-tab.is-active {
      color: var(--text);
      background: rgba(124, 92, 255, 0.28);
      box-shadow: 0 0 0 1px rgba(124, 92, 255, 0.35);
    }

    .input-mode-tab:focus-visible {
      outline: 2px solid var(--accent2);
      outline-offset: 2px;
    }

    .input-panel[hidden] {
      display: none !important;
    }

    .vision-panel-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .vision-panel-actions .btn-alt {
      flex: 1 1 calc(50% - 0.275rem);
      min-width: 5.25rem;
    }

    .audio-panel-actions .btn-alt {
      width: 100%;
    }

    .input-panel-hint {
      font-size: 0.62rem;
      color: var(--muted);
      text-align: center;
      margin-top: 0.45rem;
      line-height: 1.35;
    }

    .tiles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      margin-bottom: 0;
      border-radius: 12px;
      overflow: hidden;
      outline: 1px solid var(--border);
      outline-offset: 0;
    }

    .tile {
      box-sizing: border-box;
      width: 100%;
      height: 74px;
      min-height: 74px;
      max-height: 74px;
      border: none;
      border-radius: 0;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.15rem;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      transition: filter 0.12s, background 0.12s;
      font-family: inherit;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    .tile:hover:not(:disabled) {
      filter: brightness(1.12);
    }

    .tile:active:not(:disabled) {
      filter: brightness(0.9);
    }
    .tile:disabled { opacity: 0.45; cursor: not-allowed; filter: none; }

    .tile .emoji { font-size: 1.65rem; line-height: 1; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.35)); }
    .tile .label {
      font-family: "Syne", sans-serif;
      font-weight: 700;
      font-size: 0.68rem;
      letter-spacing: 0.04em;
    }

    /* Must be .tile.* so reused move classes on non-buttons do not inherit button chrome */
    .tile.tile-rock { box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1), inset 0 2px 0 0 rgba(94, 228, 163, 0.55); }
    .tile.tile-paper { box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1), inset 0 2px 0 0 rgba(124, 92, 255, 0.55); }
    .tile.tile-scissors { box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1), inset 0 2px 0 0 rgba(255, 138, 122, 0.55); }
    .tile.tile-none { box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1), inset 0 2px 0 0 rgba(196, 181, 253, 0.55); }

    .round-result {
      min-height: 4.75rem;
      max-height: 9rem;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 1rem;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      text-align: center;
      font-size: 0.95rem;
      line-height: 1.5;
      transition: background 0.3s, border-color 0.3s;
      scrollbar-width: thin;
      overscroll-behavior: contain;
    }

    /* Stable arena layout after input mode is known (no vertical jump from new plays / panels) */
    #view-game .panel.game-layout-locked .round-result {
      height: 8.6rem;
      min-height: 8.6rem;
      max-height: 8.6rem;
      flex-shrink: 0;
    }

    #view-game .panel.game-layout-locked .input-slot {
      min-height: 11.65rem;
    }

    #view-game .panel.game-layout-locked.game-single-mode .input-slot {
      min-height: 8.65rem;
    }

    #view-game .panel.game-layout-locked .match-history-dock {
      height: 5.85rem;
      min-height: 5.85rem;
      max-height: 5.85rem;
      flex-shrink: 0;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      scrollbar-width: thin;
    }

    .match-history-placeholder {
      font-size: 0.62rem;
      color: var(--muted);
      text-align: center;
      margin: 0;
      padding: 0.65rem 0.5rem;
      line-height: 1.4;
    }

    .match-history-placeholder[hidden] {
      display: none !important;
    }

    .round-result.player-win { border-color: rgba(94, 228, 163, 0.5); background: rgba(94, 228, 163, 0.08); }
    .round-result.server-win { border-color: rgba(255, 138, 122, 0.45); background: rgba(255, 138, 122, 0.08); }
    .round-result.draw { border-color: rgba(196, 181, 253, 0.45); background: rgba(196, 181, 253, 0.06); }

    .round-result .hl { font-weight: 600; color: #fff; }
    .round-result .outcome {
      display: block;
      margin-top: 0.5rem;
      font-family: "Syne", sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
    }

    .match-end-summary {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-top: 0.85rem;
      padding-top: 0.85rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }

    .match-end-line {
      font-family: "Syne", sans-serif;
      font-weight: 600;
      font-size: 0.92rem;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .match-end-score {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .match-end-hint {
      font-size: 0.7rem;
      color: var(--muted);
      opacity: 0.9;
      margin-top: 0.1rem;
    }

    .round-result.is-match-complete.tone-you-won-match { border-color: rgba(94, 228, 163, 0.42); }
    .round-result.is-match-complete.tone-house-won-match { border-color: rgba(255, 138, 122, 0.4); }
    .round-result.is-match-complete.tone-draw-match { border-color: rgba(196, 181, 253, 0.4); }

    .round-result-block {
      display: flex;
      flex-direction: column;
      gap: var(--game-stack-gap);
    }

    /* Fixed-height play history: scroll inside, no page growth as rounds accrue */
    .match-history-dock {
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.16);
      padding: 0.35rem 0.4rem 0.4rem;
    }

    .match-history-dock[hidden] {
      display: none !important;
    }

    .match-history-dock .text-match-gallery,
    .match-history-dock .vision-match-gallery {
      padding: 0.15rem 0;
      margin: 0;
      border: none;
      border-radius: 0;
      background: transparent;
    }

    .match-history-dock .text-match-gallery:not([hidden]) + .vision-match-gallery:not([hidden]) {
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      margin-top: 0.25rem;
      padding-top: 0.3rem;
    }

    .match-history-dock .text-gallery-emoji {
      filter: none;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid var(--border);
    }

    /* Bottom row: classified | house (smaller) */
    .match-history-dock .text-gallery-duel-row .text-gallery-emoji {
      width: 1.62rem;
      height: 1.62rem;
      font-size: 0.88rem;
      border-radius: 5px;
    }

    /* Top: text button icon or vision input frame */
    .match-history-dock .text-gallery-input-slot .text-gallery-input-emoji {
      width: 2rem;
      height: 2rem;
      font-size: 0.98rem;
      border-radius: 6px;
    }

    .match-history-dock .text-gallery-input-img {
      display: block;
      width: 2rem;
      height: 2rem;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.35);
    }

    .match-history-dock .text-gallery-item {
      flex-direction: column;
      align-items: center;
      gap: 0.12rem;
      max-width: 6.25rem;
    }

    .match-history-dock .text-gallery-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 5.75rem;
      margin: 0;
      gap: 0;
    }

    .match-history-dock .text-gallery-divider-arm {
      flex: 1 1 auto;
      min-width: 0;
      height: 1px;
      background: rgba(255, 255, 255, 0.16);
    }

    .match-history-dock .text-gallery-divider-node {
      flex: 0 0 auto;
      padding: 0 0.2rem;
      font-size: 0.5rem;
      font-weight: 600;
      color: var(--muted);
      line-height: 1;
      opacity: 0.75;
    }

    .match-history-dock .text-gallery-duel-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0.18rem;
      width: 100%;
      max-width: 5.75rem;
    }

    .match-history-dock .text-gallery-vs {
      font-size: 0.55rem;
      opacity: 0.45;
      font-weight: 500;
    }

    .match-history-dock .text-gallery-duel-row .text-gallery-emoji.text-gallery-emoji-pending {
      font-size: 0.65rem;
    }

    .vision-match-gallery {
      padding: 0.65rem 0.7rem;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid var(--border);
    }

    .vision-match-gallery[hidden] {
      display: none !important;
    }

    .vision-gallery-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      justify-content: center;
    }

    .text-match-gallery {
      padding: 0.65rem 0.7rem;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid var(--border);
    }

    .text-match-gallery[hidden] {
      display: none !important;
    }

    .text-match-gallery .vision-gallery-strip,
    .vision-match-gallery .vision-gallery-strip {
      gap: 0.32rem;
      row-gap: 0.28rem;
    }

    .text-gallery-input-slot {
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
    }

    .text-gallery-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 0.2rem;
    }

    .text-gallery-input-img {
      display: block;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.35);
    }

    .text-gallery-divider {
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 7.5rem;
    }

    .text-gallery-divider-arm {
      flex: 1 1 auto;
      min-width: 0;
      height: 1px;
      background: rgba(255, 255, 255, 0.14);
    }

    .text-gallery-divider-node {
      flex: 0 0 auto;
      padding: 0 0.25rem;
      font-size: 0.55rem;
      font-weight: 600;
      color: var(--muted);
      line-height: 1;
    }

    .text-gallery-duel-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }

    .text-gallery-vs {
      flex: 0 0 auto;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      line-height: 1;
      opacity: 0.55;
      user-select: none;
    }

    .text-gallery-emoji {
      width: 4.5rem;
      height: 4.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.35rem;
      line-height: 1;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.28);
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.35));
    }

    .text-gallery-emoji.text-gallery-emoji-pending {
      font-size: 1.1rem;
      color: var(--muted);
      font-weight: 600;
    }

    .you-play-line,
    .house-play-line {
      display: block;
      font-size: 0.62rem;
      line-height: 1.35;
      margin-top: 0.2rem;
    }

    .you-play-line {
      color: var(--text);
    }

    .house-play-line {
      color: var(--muted);
    }

    .house-play-line .hi { font-weight: 600; color: var(--text); }

    .house-play-pending {
      color: var(--muted);
      opacity: 0.75;
      font-style: italic;
    }

    .btn-ghost {
      margin-top: 1rem;
      width: 100%;
      padding: 0.75rem 1rem;
      min-height: 48px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    #view-game #btn-new-match {
      margin-top: var(--game-stack-gap);
    }

    #btn-new-match.needs-attention {
      border-color: rgba(124, 92, 255, 0.45);
      color: var(--text);

    .view { display: none; }
    .view.active { display: block; }

    #view-login.active { display: block; }

    /* —— Mobile / narrow screens —— */
    @media (max-width: 540px) {
      body {

<body>
  <div class="app">
    <h1>Rock · Paper · Scissors</h1>
    <p class="tagline">Outsmart the house. Five rounds to glory.</p>

    <div id="view-login" class="view active">
      <div class="panel">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" placeholder="guest" />

        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" />

        <button type="button" class="btn-primary" id="btn-login">Enter arena</button>
        <p class="error-msg" id="login-error"></p>
      </div>
    </div>

    <div id="view-game" class="view">
      <div class="panel">
        <div class="score-bar">
          <div class="score-block score-you">
            <span class="score-label">You</span>
            <span class="score-value" id="score-you" aria-live="polite">0</span>
          </div>
          <div class="round-pill">Round <span id="round-num">1</span> / <span id="round-max">5</span></div>
          <div class="score-block score-house">
            <span class="score-label">House</span>
            <span class="score-value" id="score-srv" aria-live="polite">0</span>
          </div>
        </div>
        <p class="score-match-hint">Match score: only rounds you or the house wins count. Tied rounds stay unchanged.</p>

        <p class="user-stats" id="user-stats" role="status" aria-live="polite"></p>

        <div id="game-input-section" class="game-input-section" style="display: none;" aria-label="Choose how to play your move">
          <div id="input-mode-switcher" class="input-mode-switcher" role="tablist" aria-label="Input mode" hidden></div>
          <div class="input-slot">
          <div id="panel-buttons" class="input-panel" role="tabpanel" aria-label="Text: rock, paper, scissors, none">
            <div class="tiles">
              <button type="button" class="tile tile-rock" data-move="rock" aria-label="Rock">
                <span class="emoji" aria-hidden="true">🪨</span>
                <span class="label">Rock</span>
              </button>
              <button type="button" class="tile tile-paper" data-move="paper" aria-label="Paper">
                <span class="emoji" aria-hidden="true">📄</span>
                <span class="label">Paper</span>
              </button>
              <button type="button" class="tile tile-scissors" data-move="scissors" aria-label="Scissors">
                <span class="emoji" aria-hidden="true">✂️</span>
                <span class="label">Scissors</span>
              </button>
              <button type="button" class="tile tile-none" data-move="none" aria-label="None (random)">
                <span class="emoji" aria-hidden="true">✨</span>
                <span class="label">None</span>
              </button>
            </div>
          </div>
          <div id="panel-vision" class="input-panel" role="tabpanel" hidden aria-label="Vision: file or webcam">
            <div class="vision-panel-actions">
              <button type="button" class="btn-alt" id="btn-vision-file" disabled aria-label="Choose image file">📁 File</button>
              <button type="button" class="btn-alt" id="btn-vision-live" disabled aria-label="Use live webcam">📹 Live</button>
            </div>
            <input type="file" id="vision-file-input" accept="image/*" capture="environment" class="sr-only" tabindex="-1" title="Choose image" />
            <p class="input-panel-hint" id="vision-panel-hint"></p>
          </div>
          <div id="panel-audio" class="input-panel" role="tabpanel" hidden aria-label="Audio: speak your move">
            <div class="audio-panel-actions">
              <button type="button" class="btn-alt" id="btn-audio" disabled aria-label="Speak your move">🎤 Speak</button>
            </div>
            <p class="input-panel-hint" id="audio-panel-hint"></p>
          </div>
          </div>
        </div>

        <div class="round-result-block" id="round-result-block">
          <div class="round-result" id="round-result">
            <span class="muted-hint">Pick a move to begin.</span>
          </div>
          <div id="match-history-dock" class="match-history-dock" hidden>
            <p id="match-history-placeholder" class="match-history-placeholder" hidden>Your plays for this match will appear here.</p>
            <div id="text-match-gallery" class="text-match-gallery" hidden></div>
            <div id="vision-match-gallery" class="vision-match-gallery" hidden></div>
          </div>
        </div>

        <button type="button" class="btn-ghost" id="btn-new-match">New match</button>
      </div>
    </div>

    <div id="vision-webcam-modal" class="vision-webcam-modal" hidden>
      <div class="vision-webcam-backdrop" id="vision-webcam-backdrop"></div>
      <div class="vision-webcam-panel" role="dialog" aria-modal="true" aria-labelledby="vision-webcam-title">
        <h3 id="vision-webcam-title">Webcam</h3>
        <video id="vision-webcam-video" playsinline autoplay muted></video>
        <div class="vision-webcam-actions">
          <button type="button" class="btn-primary" id="vision-webcam-capture">Capture</button>
          <button type="button" class="btn-ghost" id="vision-webcam-cancel">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    const INPUT_MODE_STORAGE_KEY = 'rps-input-mode';
    const INPUT_MODE_LABELS = { buttons: 'Text', vision: 'Vision', audio: 'Audio' };
    const INPUT_MODE_PANELS = { buttons: 'panel-buttons', vision: 'panel-vision', audio: 'panel-audio' };

    const state = {
      authHeader: null,
      username: '',
      sessionId: null,
      maxRounds: 5,
      busy: false,
      mlBundle: null,
      ml: { visionSession: null, visionVersion: null },
      visionWebcamStream: null,
      visionGallery: [],
      textGestureGallery: [],
      enabledInputModes: ['buttons'],
      activeInputMode: 'buttons',
      canVisionFile: false,
      canVisionLive: false,
      canAudio: false,
    };

    function basicAuthHeader(user, pass) {
      const raw = user + ':' + pass;
      try {
        return 'Basic ' + btoa(unescape(encodeURIComponent(raw)));
      } catch (e) {
        return 'Basic ' + btoa(raw);
      }
    }

    /** Prefix for API paths when this page is served under a path prefix (e.g. /api/game → /api/sessions). /admin/game uses '' so calls stay /sessions (same origin as /admin). */
    function apiBase() {
      const path = window.location.pathname.replace(/\/+$/, '');
      const m = path.match(/^(.*)\/game$/);
      if (!m) return '';
      const base = m[1];
      if (base === '/admin') return '';
      return base;
    }

    async function api(path, options = {}) {
      const method = (options.method || 'GET').toUpperCase();
      const headers = { ...(options.headers || {}) };
      if (state.authHeader) headers['Authorization'] = state.authHeader;
      if (options.body != null && method !== 'GET' && method !== 'HEAD') {
        headers['Content-Type'] = headers['Content-Type'] || 'application/json';
      }
      const prefix = apiBase();
      const url = prefix ? prefix + (path.startsWith('/') ? path : '/' + path) : path;
      const res = await fetch(url, { ...options, headers });
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch (_) {}
      if (!res.ok) {
        const msg = (data && data.detail) ? (typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail)) : res.statusText;
        throw new Error(msg || 'Request failed');
      }
      return data;
    }

    function resetMlClientState() {
      state.mlBundle = null;
      const vs = state.ml.visionSession;
      state.ml.visionSession = null;
      state.ml.visionVersion = null;
      if (vs && typeof vs.release === 'function') {
        try { vs.release(); } catch (_) {}
      }
    }

    function mlIdbOpen() {
      return new Promise((resolve, reject) => {
        const r = indexedDB.open('rps-ml-cache', 1);
        r.onerror = () => reject(r.error);
        r.onsuccess = () => resolve(r.result);
        r.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('models')) db.createObjectStore('models');
        };
      });
    }

    async function mlIdbGet(key) {
      const db = await mlIdbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('models', 'readonly');
        const q = tx.objectStore('models').get(key);
        q.onsuccess = () => resolve(q.result);
        q.onerror = () => reject(q.error);
      });
    }

    async function mlIdbSet(key, val) {
      const db = await mlIdbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('models', 'readwrite');
        tx.objectStore('models').put(val, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function ensureOrtLoaded(info) {
      if (window.ort) return;
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = info.ort_min_js;
        s.async = true;
        s.crossOrigin = 'anonymous';
        s.onload = () => resolve();
        s.onerror = () => reject(new Error('Could not load ONNX Runtime Web'));
        document.head.appendChild(s);
      });
      ort.env.wasm.wasmPaths = info.wasm_base;
    }

    function buildNCHWTensorFromCanvas(canvas, inp) {
      const W = inp.width;
      const H = inp.height;
      const mean = inp.mean || [0.485, 0.456, 0.406];
      const std = inp.std || [0.229, 0.224, 0.225];
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      const imgData = ctx.getImageData(0, 0, W, H);
      const d = imgData.data;
      const out = new Float32Array(1 * 3 * H * W);
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          const i = (y * W + x) * 4;
          const r = d[i] / 255;
          const g = d[i + 1] / 255;
          const b = d[i + 2] / 255;
          const nx = x;
          const ny = y;
          out[0 * H * W + ny * W + nx] = (r - mean[0]) / std[0];
          out[1 * H * W + ny * W + nx] = (g - mean[1]) / std[1];
          out[2 * H * W + ny * W + nx] = (b - mean[2]) / std[2];
        }
      }
      return new ort.Tensor('float32', out, [1, 3, H, W]);
    }

    async function prepareVisionSession() {
      const bundle = state.mlBundle;
      const v = bundle && bundle.vision;
      if (!v || !v.available || !v.model_url) throw new Error('Vision model not available');
      await ensureOrtLoaded(bundle.onnx_runtime_web);
      const cacheKey = 'vision:' + v.version + ':' + v.sha256;
      let buf = await mlIdbGet(cacheKey);
      if (!buf) {
        const prefix = apiBase();
        const url = prefix ? prefix + v.model_url : v.model_url;
        const res = await fetch(url, { headers: { Authorization: state.authHeader } });
        if (!res.ok) throw new Error('Model download failed');
        buf = await res.arrayBuffer();
        await mlIdbSet(cacheKey, buf);
      }
      if (state.ml.visionVersion !== v.version || !state.ml.visionSession) {
        if (state.ml.visionSession && typeof state.ml.visionSession.release === 'function') {
          try { state.ml.visionSession.release(); } catch (_) {}
        }
        state.ml.visionSession = await ort.InferenceSession.create(buf, { executionProviders: ['wasm'] });
        state.ml.visionVersion = v.version;
      }
      return v;
    }

    function drawSourceToVisionCanvas(source, v) {
      const canvas = document.createElement('canvas');
      canvas.width = v.input.width;
      canvas.height = v.input.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(source, 0, 0, canvas.width, canvas.height);
      return canvas;
    }

    function escapeHtmlVision(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function canvasToVisionThumbDataUrl(sourceCanvas, maxSide) {
      const cap = maxSide || 112;
      const w = sourceCanvas.width;
      const h = sourceCanvas.height;
      const scale = Math.min(1, cap / Math.max(w, h));
      const tw = Math.max(1, Math.round(w * scale));
      const th = Math.max(1, Math.round(h * scale));
      const c = document.createElement('canvas');
      c.width = tw;
      c.height = th;
      c.getContext('2d').drawImage(sourceCanvas, 0, 0, tw, th);
      return c.toDataURL('image/jpeg', 0.85);
    }

    const TEXT_MOVE_UI = {
      rock: { emoji: '🪨', label: 'Rock' },
      paper: { emoji: '📄', label: 'Paper' },
      scissors: { emoji: '✂️', label: 'Scissors' },
      none: { emoji: '✨', label: 'None' },
    };

    function textMoveUi(move) {
      const m = String(move || '').toLowerCase();
      return TEXT_MOVE_UI[m] || { emoji: '❔', label: String(move || '?') };
    }

    function syncMatchHistoryDockVisibility() {
      const dock = $('match-history-dock');
      const ph = $('match-history-placeholder');
      if (!dock) return;
      const panel = document.querySelector('#view-game .panel');
      const locked = panel && panel.classList.contains('game-layout-locked');
      const has = state.textGestureGallery.length > 0 || state.visionGallery.length > 0;
      if (!locked) {
        if (has) dock.removeAttribute('hidden');
        else dock.setAttribute('hidden', '');
        if (ph) ph.setAttribute('hidden', '');
        return;
      }
      dock.removeAttribute('hidden');
      if (ph) {
        if (has) ph.setAttribute('hidden', '');
        else ph.removeAttribute('hidden');
      }
    }

    function lockGamePanelLayout() {
      if (!state.authHeader) return;
      const vg = $('view-game');
      if (!vg || !vg.classList.contains('active')) return;
      const panel = document.querySelector('#view-game .panel');
      if (!panel) return;
      panel.classList.add('game-layout-locked');
      const en = state.enabledInputModes || ['buttons'];
      panel.classList.toggle('game-single-mode', en.length < 2);
      syncMatchHistoryDockVisibility();
    }

    function unlockGamePanelLayout() {
      const panel = document.querySelector('#view-game .panel');
      if (panel) {
        panel.classList.remove('game-layout-locked', 'game-single-mode');
      }
      const ph = $('match-history-placeholder');
      if (ph) ph.setAttribute('hidden', '');
      syncMatchHistoryDockVisibility();
    }

    function roundNumFromPlay(data) {
      const n = Number(data && data.round);
      return Number.isFinite(n) ? n : 0;
    }

    function matchHistoryDividerEl() {
      const divider = document.createElement('div');
      divider.className = 'text-gallery-divider';
      divider.setAttribute('aria-hidden', 'true');
      const divArmL = document.createElement('span');
      divArmL.className = 'text-gallery-divider-arm';
      const divNode = document.createElement('span');
      divNode.className = 'text-gallery-divider-node';
      divNode.textContent = '+';
      const divArmR = document.createElement('span');
      divArmR.className = 'text-gallery-divider-arm';
      divider.appendChild(divArmL);
      divider.appendChild(divNode);
      divider.appendChild(divArmR);
      return divider;
    }

    function appendTileOrVoiceHistory(data, viaAudio) {
      state.textGestureGallery.push({
        round: roundNumFromPlay(data),
        move: String(data.player_move != null ? data.player_move : ''),
        houseMove: String(data.server_move != null ? data.server_move : ''),
        viaAudio: !!viaAudio,
      });
      renderTextMatchGallery();
    }

    function patchLastVisionWithHouse(data) {
      const arr = state.visionGallery;
      if (!arr.length) return;
      const last = arr[arr.length - 1];
      const rn = roundNumFromPlay(data);
      if (rn) last.round = rn;
      last.houseMove = String(data.server_move != null ? data.server_move : '');
      renderVisionMatchGallery();
    }

    function renderTextMatchGallery() {
      const host = $('text-match-gallery');
      if (!host) return;
      if (!state.textGestureGallery.length) {
        host.replaceChildren();

    function recordVisionClassification(canvas, label) {
      const rn = parseInt($('round-num').textContent, 10);
      const round = Number.isFinite(rn) ? rn : 1;
      state.visionGallery.push({
        thumb: canvasToVisionThumbDataUrl(canvas, 112),
        label: String(label),
        round,
        houseMove: null,
      });
      renderVisionMatchGallery();
    }

    function clearMatchPlayGalleries() {
      state.visionGallery = [];
      state.textGestureGallery = [];
      renderVisionMatchGallery();
      renderTextMatchGallery();
    }

    async function runVisionOnCanvas(canvas, v) {
      const tensor = buildNCHWTensorFromCanvas(canvas, v.input);
      const inName = v.input.name || 'input';
      const feeds = {};
      feeds[inName] = tensor;
      const results = await state.ml.visionSession.run(feeds);
      const outName = Object.keys(results)[0];
      const logits = results[outName].data;
      let bi = 0;
      for (let i = 1; i < logits.length; i++) {
        if (logits[i] > logits[bi]) bi = i;
      }
      const label = (v.labels && v.labels[bi]) ? v.labels[bi] : 'none';
      recordVisionClassification(canvas, label);
      onPlayMove(label === 'none' ? 'none' : label, 'vision');
    }

    async function runVisionOnFile(file) {
      const v = await prepareVisionSession();
      const bmp = await createImageBitmap(file);
      try {
        const canvas = drawSourceToVisionCanvas(bmp, v);
        await runVisionOnCanvas(canvas, v);
      } finally {
        if (bmp && typeof bmp.close === 'function') bmp.close();
      }
    }

    function stopVisionWebcam() {
      const video = $('vision-webcam-video');
      const stream = state.visionWebcamStream;
      state.visionWebcamStream = null;
      if (video) video.srcObject = null;
      if (stream && stream.getTracks) {
        stream.getTracks().forEach((t) => {
          try { t.stop(); } catch (_) {}
        });
      }
    }

    function visionWebcamOnEscape(e) {
      if (e.key === 'Escape') closeVisionWebcamModal();
    }

    function closeVisionWebcamModal() {
      stopVisionWebcam();
      const modal = $('vision-webcam-modal');
      if (modal) modal.hidden = true;
      document.removeEventListener('keydown', visionWebcamOnEscape);
    }

    async function openVisionWebcamModal() {
      if (state.busy || !state.sessionId) return;
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        $('round-result').className = 'round-result';
        $('round-result').innerHTML = '<span style="color:var(--lose)">Camera not supported in this browser.</span>';
        return;
      }
      const modal = $('vision-webcam-modal');
      const video = $('vision-webcam-video');
      if (!modal || !video) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false,
        });
        state.visionWebcamStream = stream;
        video.srcObject = stream;
        modal.hidden = false;
        document.addEventListener('keydown', visionWebcamOnEscape);
      } catch (err) {
        $('round-result').className = 'round-result';
        const msg =
          err && err.name === 'NotAllowedError'
            ? 'Camera permission denied.'
            : (err && err.message) || 'Could not open camera';
        $('round-result').innerHTML = '<span style="color:var(--lose)">' + msg + '</span>';
      }
    }

    async function captureVisionWebcamFrame() {
      const video = $('vision-webcam-video');
      if (!video || !video.srcObject) return;
      if (video.readyState < 2) {
        $('round-result').className = 'round-result';
        $('round-result').innerHTML = '<span style="color:var(--lose)">Camera not ready yet.</span>';
        return;
      }
      try {
        const v = await prepareVisionSession();
        const canvas = drawSourceToVisionCanvas(video, v);
        closeVisionWebcamModal();
        await runVisionOnCanvas(canvas, v);
      } catch (err) {
        closeVisionWebcamModal();
        $('round-result').className = 'round-result';
        $('round-result').innerHTML = '<span style="color:var(--lose)">' + (err.message || 'Vision failed') + '</span>';
      }
    }

    function transcriptToMove(text) {
      const t = (text || '').toLowerCase();
      if (/\brock\b|\bstone\b/.test(t)) return 'rock';
      if (/\bpaper\b/.test(t)) return 'paper';
      if (/\bscissors?\b/.test(t)) return 'scissors';
      if (/\bnone\b|\brandom\b/.test(t)) return 'none';
      if (t.includes('rock')) return 'rock';
      if (t.includes('paper')) return 'paper';
      if (t.includes('scissor')) return 'scissors';
      return null;
    }

    function startBrowserSpeech() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      const bundle = state.mlBundle;
      if (!SR || !bundle || !bundle.audio || !bundle.audio.browser_speech) return;
      if (state.busy || !state.sessionId) return;
      const r = new SR();
      r.lang = bundle.audio.browser_speech.locale || 'en-US';
      r.interimResults = false;
      r.maxAlternatives = 1;
      r.onresult = (e) => {
        const t = (e.results[0] && e.results[0][0] && e.results[0][0].transcript) || '';
        const move = transcriptToMove(t);
        if (move) onPlayMove(move, 'audio');
        else {
          $('round-result').className = 'round-result';
          $('round-result').innerHTML = '<span style="color:var(--lose)">Say rock, paper, scissors, or none. Heard: ' + (t || '(empty)') + '</span>';
        }
      };
      r.onerror = () => {};
      try {
        r.start();
      } catch (_) {}
    }

    function rebuildInputModeTabs() {
      const sw = $('input-mode-switcher');
      if (!sw) return;
      sw.replaceChildren();
      const enabled = state.enabledInputModes || ['buttons'];
      if (enabled.length < 2) {
        sw.setAttribute('hidden', '');
        return;
      }
      sw.removeAttribute('hidden');
      for (let i = 0; i < enabled.length; i++) {
        const mode = enabled[i];
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'input-mode-tab';
        btn.setAttribute('role', 'tab');
        btn.id = 'input-tab-' + mode;
        btn.dataset.mode = mode;
        const panelId = INPUT_MODE_PANELS[mode];
        if (panelId) btn.setAttribute('aria-controls', panelId);
        btn.textContent = INPUT_MODE_LABELS[mode] || mode;
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          applyInputMode(mode, true);
        });
        sw.appendChild(btn);
      }
    }

    function applyInputMode(mode, persistToStorage) {
      const enabled = state.enabledInputModes || ['buttons'];
      if (!enabled.length) return;
      let m = mode;
      if (enabled.indexOf(m) < 0) m = enabled[0];
      state.activeInputMode = m;
      if (persistToStorage) {
        try {
          localStorage.setItem(INPUT_MODE_STORAGE_KEY, m);
        } catch (_) {}
      }
      const pb = $('panel-buttons');
      const pv = $('panel-vision');
      const pa = $('panel-audio');
      if (pb) {
        pb.hidden = m !== 'buttons';
      }
      if (pv) pv.hidden = m !== 'vision';
      if (pa) pa.hidden = m !== 'audio';
      const switcher = $('input-mode-switcher');
      if (switcher && !switcher.hasAttribute('hidden')) {
        const tabs = switcher.querySelectorAll('.input-mode-tab');
        for (let i = 0; i < tabs.length; i++) {
          const btn = tabs[i];
          const on = btn.dataset.mode === m;
          btn.setAttribute('aria-selected', on ? 'true' : 'false');
          btn.classList.toggle('is-active', on);
          btn.tabIndex = on ? 0 : -1;
        }
      }
      lockGamePanelLayout();
    }

    function resolveActiveInputMode() {
      const enabled = state.enabledInputModes || ['buttons'];
      let mode = state.activeInputMode;
      if (enabled.indexOf(mode) >= 0) return mode;
      let stored = null;
      try {
        stored = localStorage.getItem(INPUT_MODE_STORAGE_KEY);
      } catch (_) {}
      if (stored && enabled.indexOf(stored) >= 0) return stored;
      return enabled[0];
    }

    function syncVisionAudioButtonDisabled() {
      const b = state.busy;
      const vf = $('btn-vision-file');
      const vl = $('btn-vision-live');
      const ba = $('btn-audio');
      if (vf) vf.disabled = b || !state.canVisionFile;
      if (vl) vl.disabled = b || !state.canVisionLive;
      if (ba) ba.disabled = b || !state.canAudio;
    }

    async function refreshMlManifest() {
      const section = $('game-input-section');
      const hintV = $('vision-panel-hint');
      const hintA = $('audio-panel-hint');
      if (!state.authHeader) {
        if (section) section.style.display = 'none';
        return;
      }
      try {
        const b = await api('/me/ml/manifest', { method: 'GET' });
        state.mlBundle = b;
        const modes = b.input_modes || ['buttons'];
        const enabled = [];
        if (modes.indexOf('buttons') >= 0) enabled.push('buttons');
        if (modes.indexOf('vision') >= 0) enabled.push('vision');
        if (modes.indexOf('audio') >= 0) enabled.push('audio');
        if (!enabled.length) enabled.push('buttons');
        state.enabledInputModes = enabled;

        const wantVision = enabled.indexOf('vision') >= 0;
        const wantAudio = enabled.indexOf('audio') >= 0;
        let vHint = '';
        const gum = typeof navigator !== 'undefined' && navigator.mediaDevices && navigator.mediaDevices.getUserMedia;
        const v = b.vision;
        if (wantVision && v && v.available) {
          state.canVisionFile = true;
          state.canVisionLive = !!gum;
          if ($('btn-vision-file')) $('btn-vision-file').title = 'Choose an image file';
          if ($('btn-vision-live')) {
            $('btn-vision-live').title = gum
              ? 'Use live webcam (laptop or phone)'
              : 'Camera API not available in this browser';
          }
        } else {
          state.canVisionFile = false;
          state.canVisionLive = false;
          if (wantVision) {
            vHint = 'Vision: deploy ONNX on the server to enable photo mode.';
          }
          const vf = $('btn-vision-file');
          const vl = $('btn-vision-live');
          const t = 'Add ml_artifacts/vision/model.onnx on the server';
          if (vf) vf.title = wantVision ? t : '';
          if (vl) vl.title = wantVision ? t : '';
        }

        let aHint = '';
        if (wantAudio) {
          const a = b.audio;
          const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
          const stt = a && a.browser_speech && a.browser_speech.enabled && SR;
          const onnxA = a && a.onnx && a.onnx.available;
          if (stt) {
            state.canAudio = true;
            if ($('btn-audio')) $('btn-audio').title = 'Speak: rock, paper, scissors, or none';
          } else {
            state.canAudio = false;
            if (onnxA) {
              if ($('btn-audio')) {
                $('btn-audio').title =
                  'Audio ONNX UI not enabled in this client build; use browser speech in manifest.';
              }
              aHint =
                'Audio: enable browser speech in ml_artifacts/audio/manifest.json or use speech-capable browser.';
            } else {
              if ($('btn-audio')) $('btn-audio').title = 'Speech not available';
              aHint = 'Audio: use a browser with Web Speech API or deploy models.';
            }
          }
        } else {
          state.canAudio = false;
        }

        if (hintV) hintV.textContent = vHint;
        if (hintA) hintA.textContent = aHint;

        if (section) section.style.display = 'block';
        rebuildInputModeTabs();
        applyInputMode(resolveActiveInputMode(), false);
        syncVisionAudioButtonDisabled();
      } catch (_) {
        state.mlBundle = null;
        state.enabledInputModes = ['buttons'];
        state.canVisionFile = false;
        state.canVisionLive = false;
        state.canAudio = false;
        if (hintV) hintV.textContent = '';
        if (hintA) hintA.textContent = '';
        if (section) section.style.display = 'block';
        rebuildInputModeTabs();
        applyInputMode('buttons', false);
        syncVisionAudioButtonDisabled();
      }
    }

      el.textContent = msg;
      el.classList.add('visible');
    }

    function hideLoginError() {
      $('login-error').classList.remove('visible');
    }

      state.busy = disabled;
      document.querySelectorAll('.tile').forEach((t) => { t.disabled = disabled; });
      syncVisionAudioButtonDisabled();

    function showGame() {
      $('view-login').classList.remove('active');
      $('view-game').classList.add('active');
    }

    function showLogin() {
      unlockGamePanelLayout();
      closeVisionWebcamModal();
      clearMatchPlayGalleries();
      $('view-game').classList.remove('active');
      $('view-login').classList.add('active');
      state.sessionId = null;
      resetMlClientState();
      const gis = $('game-input-section');
      if (gis) gis.style.display = 'none';
      const st = $('user-stats');
      st.textContent = '';
      st.classList.remove('visible');
    }

    function renderUserStats(s) {
      const el = $('user-stats');
      el.classList.add('visible');
      if (!s.sessions_started) {
        el.textContent = 'Your stats will show here after you start playing.';
        return;
      }
      const parts = [];
      if (s.matches_completed > 0) {
        const wr = Math.round((100 * s.matches_won) / s.matches_completed);
        parts.push(
          '<span class="hl-w">' + s.matches_won + 'W</span> · ' +
          '<span class="hl-l">' + s.matches_lost + 'L</span> · ' +
          '<span class="hl-d">' + s.matches_draw + 'D</span> · ' +
          wr + '% win rate'
        );
      } else {
        parts.push('No finished matches yet');
      }
      parts.push(s.rounds_played + ' rounds');
      parts.push(s.matches_completed + ' match' + (s.matches_completed === 1 ? '' : 'es') + ' done');
      const inProg = s.sessions_started - s.matches_completed;
      if (inProg > 0) {
        parts.push(inProg + ' session' + (inProg === 1 ? '' : 's') + ' in progress');
      }
      el.innerHTML = parts.join(' · ');
    }

    async function refreshUserStats() {
      if (!state.authHeader) return;
      const el = $('user-stats');
      el.classList.add('visible');
      el.textContent = 'Updating stats…';
      try {
        const s = await api('/me/stats', { method: 'GET' });
        renderUserStats(s);
      } catch (_) {
        el.textContent = '';
        el.classList.remove('visible');
      }
    }

    function pickNum(data, a, b) {
      const v = data && (data[a] !== undefined && data[a] !== null ? data[a] : data[b]);
      const n = Number(v);
      return Number.isFinite(n) ? Math.max(0, Math.floor(n)) : 0;
    }

    function updateScores(data) {
      if (!$('score-you') || !$('score-srv')) return;
      $('score-you').textContent = String(pickNum(data, 'player_score', 'playerScore'));
      $('score-srv').textContent = String(pickNum(data, 'server_score', 'serverScore'));
      const roundVal = data && (data.round !== undefined && data.round !== null ? data.round : data.roundNumber);
      const rn = Number(roundVal);
      $('round-num').textContent = String(Number.isFinite(rn) ? rn : 0);
      $('round-max').textContent = String(state.maxRounds);
    }

    function roundResultClass(w) {
      if (w === 'player') return 'player-win';
      if (w === 'server') return 'server-win';
      return 'draw';
    }

    function outcomePhrase(w) {
      if (w === 'player') return 'You take this round';
      if (w === 'server') return 'House takes this round';
      return 'Stalemate';
    }

    function matchSummaryToneClass(winner) {
      if (winner === 'player') return 'tone-you-won-match';
      if (winner === 'server') return 'tone-house-won-match';
      return 'tone-draw-match';
    }

    function buildMatchEndSummary(winner, data) {
      let line = 'Match drawn.';
      if (winner === 'player') line = 'You took the match.';
      else if (winner === 'server') line = 'House took the match.';
      const py = pickNum(data, 'player_score', 'playerScore');
      const ps = pickNum(data, 'server_score', 'serverScore');
      return (
        '<div class="match-end-summary" role="status">' +
        '<span class="match-end-line">' + line + '</span>' +
        '<span class="match-end-score">Final · You ' + py + ' — House ' + ps + '</span>' +
        '<span class="match-end-hint">Use <strong>New match</strong> when you want to continue.</span>' +
        '</div>'
      );
    }

    function renderRoundResult(data) {
      const el = $('round-result');
      const rw = data.round_winner;
      let cls = 'round-result ' + roundResultClass(rw);
      if (data.match_complete) cls += ' is-match-complete ' + matchSummaryToneClass(data.winner);
      el.className = cls;
      const you = data.player_move;
      const them = data.server_move;
      let html =
        'Round <span class="hl">' + data.round + '</span> — You played <span class="hl">' + you + '</span>, house played <span class="hl">' + them + '</span>.' +
        '<span class="outcome">' + outcomePhrase(rw) + '</span>';
      if (data.match_complete) html += buildMatchEndSummary(data.winner, data);
      el.innerHTML = html;
    }

    async function startSession() {
      const data = await api('/sessions', { method: 'POST', body: '{}' });
      clearMatchPlayGalleries();
      state.sessionId = data.session_id;
      state.maxRounds = data.max_rounds || 5;
      $('round-max').textContent = state.maxRounds;
      $('score-you').textContent = '0';
      $('score-srv').textContent = '0';
      $('round-num').textContent = '1';
      const rr = $('round-result');
      rr.className = 'round-result';
      rr.innerHTML = '<span style="color:var(--muted)">Best of ' + state.maxRounds + '. Choose your move.</span>';
      const nm = $('btn-new-match');
      if (nm) nm.classList.remove('needs-attention');
    }

    async function onLogin() {
      hideLoginError();
      const user = $('username').value.trim() || 'guest';
      const pass = $('password').value;
      state.username = user;
      state.authHeader = basicAuthHeader(user, pass);
      $('btn-login').disabled = true;
      try {
        await startSession();
        showGame();
        await refreshUserStats();
        await refreshMlManifest();
      } catch (e) {
        showLoginError(e.message || 'Sign-in failed. Check username and password.');
        state.authHeader = null;
      } finally {
        $('btn-login').disabled = false;
      }
    }

    async function onPlayMove(move, playSource) {
      if (state.busy || !state.sessionId) return;
      const image = move === 'none' ? '' : move;
      setTilesDisabled(true);
      let matchJustEnded = false;
      try {
        const data = await api('/play', {
          method: 'POST',
          body: JSON.stringify({ session_id: state.sessionId, image }),
        });
        updateScores(data);
        renderRoundResult(data);
        if (playSource === 'buttons') {
          appendTileOrVoiceHistory(data, false);
        } else if (playSource === 'audio') {
          appendTileOrVoiceHistory(data, true);
        } else if (playSource === 'vision') {
          patchLastVisionWithHouse(data);
        }
        if (data.match_complete) {
          matchJustEnded = true;
          const nm = $('btn-new-match');
          if (nm) nm.classList.add('needs-attention');
          refreshUserStats();
        }
      } catch (e) {
        if (playSource === 'vision' && state.visionGallery.length) {
          state.visionGallery.pop();
          renderVisionMatchGallery();
        }
        $('round-result').className = 'round-result';
        $('round-result').innerHTML = '<span style="color:var(--lose)">' + (e.message || 'Play failed') + '</span>';
      } finally {
        if (!matchJustEnded) setTilesDisabled(false);
      }
    }

    async function onNewMatch() {
      setTilesDisabled(true);
      const nm = $('btn-new-match');
      if (nm) nm.classList.remove('needs-attention');
      try {
        await startSession();
        $('round-result').className = 'round-result';
        $('round-result').innerHTML = '<span style="color:var(--muted)">New match. Choose your move.</span>';
        await refreshUserStats();
        await refreshMlManifest();
      } catch (e) {
        $('round-result').className = 'round-result';
        $('round-result').innerHTML = '<span style="color:var(--lose)">' + (e.message || 'Could not start match') + '</span>';
      } finally {
        setTilesDisabled(false);
      }
    }

    $('btn-vision-file').addEventListener('click', () => {
      if ($('btn-vision-file').disabled) return;
      $('vision-file-input').click();
    });

    $('btn-vision-live').addEventListener('click', () => {
      if ($('btn-vision-live').disabled) return;
      openVisionWebcamModal();
    });

    $('vision-webcam-cancel').addEventListener('click', () => closeVisionWebcamModal());
    $('vision-webcam-backdrop').addEventListener('click', () => closeVisionWebcamModal());
    $('vision-webcam-capture').addEventListener('click', () => {
      captureVisionWebcamFrame();
    });

    $('vision-file-input').addEventListener('change', async (e) => {
      const inp = e.target;
      const f = inp.files && inp.files[0];
      inp.value = '';
      if (!f || state.busy || !state.sessionId) return;
      try {
        await runVisionOnFile(f);
      } catch (err) {
        $('round-result').className = 'round-result';
        $('round-result').innerHTML = '<span style="color:var(--lose)">' + (err.message || 'Vision failed') + '</span>';
      }
    });

    $('btn-audio').addEventListener('click', () => {
      if ($('btn-audio').disabled) return;
      startBrowserSpeech();
    });

    $('btn-login').addEventListener('click', onLogin);
    $('username').addEventListener('keydown', (e) => { if (e.key === 'Enter') onLogin(); });
    $('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') onLogin(); });

    document.querySelectorAll('.tile').forEach((btn) => {
      btn.addEventListener('click', () => onPlayMove(btn.getAttribute('data-move'), 'buttons'));
    });

    $('btn-new-match').addEventListener('click', () => { onNewMatch(); });
  </script>
</body>
</html>
